name: Maven Build


on:
  workflow_call:

    inputs:  # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onworkflow_callinputs
      runs-on:
        description: >
          A comma- or newline-separated list of GitHub Actions runner labels (for example: `ubuntu-latest,windows-latest`).  
          See https://github.com/actions/runner-images#available-images
          Append an exclamation mark '!' to a label to allow that runner's job to fail without failing the entire run (e.g., `windows-latest!`).
        default: ubuntu-latest
        type: string
      timeout-minutes:
        description: "Maximum number of minutes the workflow is allowed to run before timing out"
        default: 30
        type: number

      compile-jdk:
        description: "The JDK for compilation, either major version like 11, 17 or with vendor like 'temurin@11'"
        required: true
        type: string
      test-jdks:
        description: >
          A comma- or newline-separated list of additional JDKs to run tests against, either major version like 11, 17 or with vendor like 'temurin@11'.
          Append an exclamation mark '!' suffix to allow failures for that JDK (e.g., `24!`).
        required: false
        type: string

      maven-jdk:
        description: "The JDK to run Apache Maven, either major version like 11, 17 or with vendor like 'temurin@11'"
        default: temurin@21
        type: string
      maven-versions:
        description: >
          A comma- or newline-separated list of Maven runtimes to use, for example `latest,3.6.1,mvnw`.
          Use `mvnw` to invoke the project's own `./mvnw` wrapper script; otherwise specify a version number or `latest`.
          Append an exclamation mark '!' suffix to allow failures for that Maven version (e.g., `latest!`).
        required: false
        type: string
      extra-maven-args:
        description: "Additional command-line arguments to append to all Maven invocations"
        required: false
        type: string
      maven-settings-file:
        description: "Path to a custom Maven settings.xml file to use during the build"
        required: false
        type: string

      development-branch:
        description: "Long-lived development branch that serves as the source for cutting Maven releases and publishing SNAPSHOT version (e.g., 'main' or 'develop')"
        default: main
        type: string
      release-trigger-file:
        description: >
          Path to a shell script that defines variables evaluated by the workflow to decide whether to perform an automatic Maven release. 
          It defines these environment variables: 
          POM_CURRENT_VERSION (snapshot version that must match the effective `pom.xml` version to trigger a release), 
          POM_RELEASE_VERSION (next release version to set),
          DRY_RUN (true/false to simulate without changes), and 
          SKIP_TESTS (true/false to skip tests). 
          When on the development branch and `POM_CURRENT_VERSION` matches, a release is cut automatically -
          otherwise (or if unset/empty) no release is performed.
        default: .ci/release-trigger.sh
        type: string
      javadoc-branch:
        description: "Branch where generated Javadoc HTML is published (e.g. `gh-pages`). Omit or leave blank to skip Javadoc deployment"
        required: false
        type: string
      snapshots-branch:
        description: "Branch to which SNAPSHOT artifacts are deployed (e.g. `mvn-snapshots`). Omit or leave blank to skip snapshot publishing"
        required: false
        type: string

      before-build: 
        description: "Bash commands executed before the Maven build"
        required: false
        type: string
      after-build:
        description: "Bash commands executed after the Maven build" 
        required: false
        type: string

      debug-with-ssh:
        description: >-
          When to open an SSH session for post-build debugging:
          always | on_failure | on_failure_or_cancelled | never
        default: "never"
        type: string
      debug-with-ssh-only-for-actor:
        description: "Restrict SSH debug session access to the GitHub user who triggered the workflow"
        # NOTE: using 'string' here is a WORKAROUND so the job doesn’t hang when the caller omits the value (push events pass 'undefined').
        type: string
        default: "true"
        #default: true
        #type: boolean
      debug-with-ssh-only-jobs-matching:
        description: "Only start an SSH session for jobs matching this regex pattern:"
        default: ".*"
        type: string

      # workaround for https://github.com/actions/toolkit/issues/1264
      gha-shared-repo:    { default: "sebthom/gha-shared", type: string, description: "Repository containing this workflow" }
      gha-shared-version: { default: "v1",                 type: string, description: "Version of this workflow: branch, tag or commit" }

    secrets:  # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onworkflow_callsecrets
      SONATYPE_CENTRAL_USER:
        description: "Sonatype Central username (required only for publishing releases to Maven central)"
        required: false
      SONATYPE_CENTRAL_TOKEN:
        description: "Sonatype Central API token (required only for publishing releases to Maven central)"
        required: false
      GPG_SIGN_KEY:
        description: "Base64-encoded GPG private key for signing release artifacts (required only for publishing releases to Maven central)"
        required: false
      GPG_SIGN_KEY_PWD:
        description: "Passphrase for the GPG signing keys (required only for publishing releases to Maven central)"
        required: false
      CODECOV_TOKEN:
        description: "Codecov upload token for publishing test coverage reports"
        required: false


defaults:
  run:
    shell: bash


jobs:
  ###########################################################
  init:
  ###########################################################
    runs-on: ubuntu-latest  # https://github.com/actions/runner-images#available-images

    steps:
    - name: "Show: GitHub context"
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: printf '%s' "$GITHUB_CONTEXT" | python -m json.tool


    - name: "Show: environment variables"
      run: env | sort


    - name: Git Checkout
      uses: actions/checkout@v4  # https://github.com/actions/checkout


    - name: Lint shell scripts
      uses: luizm/action-sh-checker@master  # https://github.com/marketplace/actions/sh-checker
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SHFMT_OPTS: --simplify --keep-padding
      with:
         sh_checker_comment: true
         sh_checker_checkbashisms_enable: true
         sh_checker_shfmt_disable: true


    - name: Parse inputs
      id: PARSE_INPUTS
      env:
        RUNS_ON:        ${{ inputs.runs-on }}
        COMPILE_JDK:    ${{ inputs.compile-jdk }}
        TEST_JDKS:      ${{ inputs.test-jdks }}
        MAVEN_JDK:      ${{ inputs.maven-jdk }}
        MAVEN_VERSIONS: ${{ inputs.maven-versions }}
        ON_DEV_BRANCH:  ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.development-branch) && 'true' || 'false' }}
        CODECOV_TOKEN:  ${{ secrets.CODECOV_TOKEN }}
      shell: python {0}
      run: |
        import collections, json, os, re, uuid
        ENV = os.environ

        def parse_runner(runner_spec: str):
            # Parse Runner label spec with optional '!' indicating allowed failure
            # return (label, allow_failure)
            allow_failure = runner_spec.endswith('!')
            label = runner_spec[:-1] if allow_failure else runner_spec
            return label.strip(), allow_failure

        def parse_jdk(jdk_spec: str):
            # Parse JDK spec with optional '!' indicating allowed failure
            # return (vendor, version, allow_failure) with default vendor 'temurin'
            allow_failure = jdk_spec.endswith('!')
            jdk_spec = jdk_spec[:-1] if allow_failure else jdk_spec
            if '@' in jdk_spec:
                vendor, version = jdk_spec.split('@', 1)
            else:
                vendor, version = 'temurin', jdk_spec
            return vendor.strip(), version.strip(), allow_failure

        def parse_maven(mvn_spec: str):
            # Parse Maven version spec with optional '!' indicating allowed failure
            # return (version, allow_failure)
            allow_failure = mvn_spec.endswith('!')
            version = mvn_spec[:-1] if allow_failure else mvn_spec
            return version.strip(), allow_failure

        def split_items(value: str):
            # Split on comma *or* any newline sequence (\n, \r\n, \r), collapse multiple
            # separators, and return trimmed, **unique** tokens in first-seen order.
            tokens = [v.strip() for v in re.split(r'[,\r\n]+', value) if v.strip()]
            return list(collections.OrderedDict.fromkeys(tokens))

        runners = [parse_runner(r) for r in split_items(ENV["RUNS_ON"])]
        if not runners:
            runners = [("ubuntu-latest", False)]

        compile_jdk  = parse_jdk(ENV["COMPILE_JDK"])
        maven_jdk    = parse_jdk(ENV["MAVEN_JDK"])
        test_jdks    = [parse_jdk  (j) for j in split_items(ENV["TEST_JDKS"])]
        mvn_versions = [parse_maven(m) for m in split_items(ENV["MAVEN_VERSIONS"])]
        if not mvn_versions:
            mvn_versions = [("mvn" if os.path.isfile("./mvnw") else "latest", False)]

        on_dev_branch = ENV["ON_DEV_BRANCH"] == "true"
        codecov_token = ENV["CODECOV_TOKEN"]

        matrix = []

        # compile JDK
        for runner_idx, (runner_label, runner_allow_failure) in enumerate(runners):
            for mvn_idx, (mvn_version, mvn_allow_failure) in enumerate(mvn_versions):
                can_create_release = on_dev_branch if runner_idx == 0 and mvn_idx == 0 else False

                if can_create_release:
                    concurrency_group = f"{ENV["GITHUB_WORKFLOW"]}-release"
                else:
                    concurrency_group = uuid.uuid4().hex

                entry = {
                  "TEST_JDK_VERSION":       compile_jdk[1],
                  "TEST_JDK_VENDOR":        compile_jdk[0],
                  "MAVEN_VERSION":          mvn_version,
                  "RUNS_ON":                runner_label,
                  "COMPILE_JDK_VERSION":    compile_jdk[1],
                  "COMPILE_JDK_VENDOR":     compile_jdk[0],
                  "MAVEN_JDK_VERSION":      maven_jdk[1],
                  "MAVEN_JDK_VENDOR":       maven_jdk[0],
                  "CAN_CREATE_RELEASE":     can_create_release,
                  "CAN_UPDATE_MAVEN_CACHE": mvn_idx == 0, # only the first job per runner updates the Maven cache
                  "CONCURRENCY_GROUP":      concurrency_group,
                  "ALLOW_FAILURE":          runner_allow_failure or mvn_allow_failure,
                  "UPLOAD_TO_CODECOV":      runner_idx == 0 and mvn_idx == 0 and codecov_token != "",
                }
                if entry not in matrix:
                    matrix.append(entry)

        # test JDKs
        for runner_idx, (runner_label, runner_allow_failure) in enumerate(runners):
            for jdk_vendor, jdk_version, jdk_allow_failure in test_jdks:
                for mvn_idx, (mvn_version, mvn_allow_failure) in enumerate(mvn_versions):
                    entry = {
                      "TEST_JDK_VERSION":       jdk_version,
                      "TEST_JDK_VENDOR":        jdk_vendor,
                      "MAVEN_VERSION":          mvn_version,
                      "RUNS_ON":                runner_label,
                      "COMPILE_JDK_VERSION":    compile_jdk[1],
                      "COMPILE_JDK_VENDOR":     compile_jdk[0],
                      "MAVEN_JDK_VERSION":      maven_jdk[1],
                      "MAVEN_JDK_VENDOR":       maven_jdk[0],
                      "CAN_CREATE_RELEASE":     False,
                      "CAN_UPDATE_MAVEN_CACHE": False,
                      "CONCURRENCY_GROUP":      uuid.uuid4().hex,
                      "ALLOW_FAILURE":          jdk_allow_failure or mvn_allow_failure,
                      "UPLOAD_TO_CODECOV":      runner_idx == 0 and mvn_idx == 0 and codecov_token != ""
                    }
                    if entry not in matrix:
                        matrix.append(entry)

        json_out = json.dumps(matrix, separators=(",",":"))
        print("::group::Generated Matrix Config")
        print(json.dumps(matrix, indent=2, sort_keys=True))
        print("::endgroup::")

        # write to GitHub output
        with open(ENV["GITHUB_OUTPUT"], "a") as out:
            out.write(f"MATRIX={json_out}\n")


    - name: Detect if CODECOV_TOKEN secret is present
      id: HAS_CODECOV_TOKEN
      run: |
        if [ -n "${{ secrets.CODECOV_TOKEN }}" ]; then
          echo "present=1" >>"$GITHUB_OUTPUT"
        fi


    outputs:
      MATRIX:            ${{ steps.PARSE_INPUTS.outputs.MATRIX }}
      HAS_CODECOV_TOKEN: ${{ steps.HAS_CODECOV_TOKEN.outputs.present }}


  ###########################################################
  build:
  ###########################################################
    runs-on: ${{ matrix.RUNS_ON }}  # https://github.com/actions/runner-images#available-images
    continue-on-error: ${{ matrix.ALLOW_FAILURE }}
    needs: [ init ]
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.init.outputs.MATRIX) }}


    # https://docs.github.com/en/actions/using-jobs/using-concurrency
    concurrency:
      group: ${{ matrix.CONCURRENCY_GROUP }}
      cancel-in-progress: false


    permissions:
      actions: write  # to delete action cache entries
      contents: write # to create releases (commit to dev branch, create tags)


    steps:
    - name: "Show: GitHub context"
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: printf '%s' "$GITHUB_CONTEXT" | python -m json.tool


    - name: "Show: Matrix config"
      env:
        MATRIX: ${{ toJSON(matrix) }}
      run: printf '%s' "$MATRIX" | python -m json.tool


    - name: "Show: environment variables"
      run: env | sort


    - name: "Show: Init job outputs"
      env:
        JOB_OUTPUT: ${{ toJson(needs.init.outputs) }}
      run: printf '%s' "$JOB_OUTPUT" | python -m json.tool


    - name: Git Checkout
      uses: actions/checkout@v4  # https://github.com/actions/checkout


    - name: Download workflow resources
      env:
        GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_REPO:    ${{ inputs.gha-shared-repo }}    # e.g. sebthom/gha-shared
        WORKFLOW_VERSION: ${{ inputs.gha-shared-version }} # branch, tag or commit SHA
        DEST: /tmp/gha-shared
      run: |
        set -euo pipefail

        URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${WORKFLOW_REPO}.git"
        REF="$WORKFLOW_VERSION"

        # Trim refs/heads/ or refs/tags/ if present
        [[ "$REF" == refs/* ]] && REF="${REF#refs/heads/}" && REF="${REF#refs/tags/}"

        rm -rf "$DEST" # for nektos/act in case of re-runs

        # If REF looks like a 40-char SHA, treat as commit; else as branch/tag
        if [[ "$REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
          echo "Cloning repo [$WORKFLOW_REPO] and checking out commit [$REF]..."
          (
            set -x; 
            git clone --depth 1 --no-checkout "$URL" "$DEST";
            git -C "$DEST" fetch --depth 1 origin "$REF";
            git -C "$DEST" checkout "$REF";
          )
        else
          echo "Cloning repo [$WORKFLOW_REPO] and checking out branch/tag [$REF]..."
          (set -x; git clone --depth 1 --branch "$REF" "$URL" "$DEST")
        fi

        echo "✅ Checked out $WORKFLOW_REPO@$WORKFLOW_VERSION into $DEST"
        (set -x; ls -l "$DEST")


    - name: "Install: JDK ${{ matrix.COMPILE_JDK_VERSION }} ☕ (for compilation)"
      uses: actions/setup-java@v4  # https://github.com/actions/setup-java
      id: SETUP_COMPILE_JDK
      with:
        distribution: ${{ matrix.COMPILE_JDK_VENDOR }}
        java-version: ${{ matrix.COMPILE_JDK_VERSION }}


    - name: "Install: JDK ${{ matrix.TEST_JDK_VERSION }} ☕ (for tests)"
      uses: actions/setup-java@v4  # https://github.com/actions/setup-java
      id: SETUP_TEST_JDK
      with:
        distribution: ${{ matrix.TEST_JDK_VENDOR }}
        java-version: ${{ matrix.TEST_JDK_VERSION }}


    # Maven JDK must be installed last so it is the one on PATH
    - name: "Install: JDK ${{ matrix.MAVEN_JDK_VERSION }} ☕ (to run Maven)"
      uses: actions/setup-java@v4  # https://github.com/actions/setup-java
      id: SETUP_MAVEN_JDK
      with:
        distribution: ${{ matrix.MAVEN_JDK_VENDOR }}
        java-version: ${{ matrix.MAVEN_JDK_VERSION }}


    - name: "Cache: Restore (Local Maven Repository)"
      id: CACHE-RESTORE-MAVEN
      uses: actions/cache/restore@v4  # https://github.com/actions/cache/blob/main/restore/README.md
      with:
        # IMPORTANT: path must have exactly the same value as in the cache save step otherwise restore will fail with cache key not found 
        # Excluded sub directory not working https://github.com/actions/toolkit/issues/713
        path: |
          ~/.m2/bin
          ~/.m2/repository/*
          !~/.m2/repository/.cache
          !~/.m2/repository/.meta
          !~/.m2/repository/*SNAPSHOT*
        key: ${{ matrix.RUNS_ON }}-mvn-repo-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ matrix.RUNS_ON }}-mvn-repo-


    - name: "Move Restored Local Maven Repo"
      if: ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-hit }}
      id: MOVE_RESTORED_MAVEN_REPO
      run: |
        set -euxo pipefail
        
        RESTORED_MAVEN_REPO_PATH=$HOME/.m2/repository-restored

        (set -x; ls -lart ~/.m2)
        if [[ -d "$HOME/.m2/repository" ]]; then
          (set -x; mv -v ~/.m2/repository "$RESTORED_MAVEN_REPO_PATH")
        else
          (set -x; mkdir -p "$RESTORED_MAVEN_REPO_PATH")
        fi
        echo "REPO_PATH=$RESTORED_MAVEN_REPO_PATH" >>$GITHUB_OUTPUT


    - name: "Before Build: Custom Bash script"
      if: inputs.before-build
      env:
        GITHUB_JOB_ID: ${{ github.job }}
        GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
      run: ${{ inputs.before-build }}


    - name: "Build with Maven 🔨"
      env:
        # core settings
        MAVEN_VERSION:            ${{ matrix.MAVEN_VERSION }}
        MAVEN_SETTINGS_FILE:      ${{ inputs.maven-settings-file || '/tmp/gha-shared/resources/maven/settings.xml' }}
        MAVEN_TOOLCHAINS_FILE:    ${{ '/tmp/gha-shared/resources/maven/toolchains.xml' }}
        RESTORED_MAVEN_REPO_PATH: ${{ steps.MOVE_RESTORED_MAVEN_REPO.outputs.REPO_PATH }}

        COMPILE_JDK_VENDOR:  ${{ matrix.COMPILE_JDK_VENDOR }}
        COMPILE_JDK_VERSION: ${{ matrix.COMPILE_JDK_VERSION }}
        COMPILE_JDK_HOME:    ${{ steps.SETUP_COMPILE_JDK.outputs.path }}
        TEST_JDK_VENDOR:     ${{ matrix.TEST_JDK_VENDOR }}
        TEST_JDK_VERSION:    ${{ matrix.TEST_JDK_VERSION }}
        TEST_JDK_HOME:       ${{ steps.SETUP_TEST_JDK.outputs.path }}

        # release toggles & credentials - will be unset for PR runs
        CAN_CREATE_RELEASE:   ${{ matrix.CAN_CREATE_RELEASE && !env.ACT }}
        RELEASE_TRIGGER_FILE: ${{ inputs.release-trigger-file }}

        GITHUB_USER:    ${{ github.actor }}
        GITHUB_API_KEY: ${{ secrets.GITHUB_TOKEN }}

        # https://github.com/s4u/sign-maven-plugin#key-configuration-provided-in-environment-variables
        SIGN_KEY:      ${{ secrets.GPG_SIGN_KEY }}
        SIGN_KEY_PASS: ${{ secrets.GPG_SIGN_KEY_PWD }}

        SONATYPE_CENTRAL_USER:  ${{ secrets.SONATYPE_CENTRAL_USER }}
        SONATYPE_CENTRAL_TOKEN: ${{ secrets.SONATYPE_CENTRAL_TOKEN }}

        JAVADOC_BRANCH:   ${{ inputs.javadoc-branch }}
        SNAPSHOTS_BRANCH: ${{ inputs.snapshots-branch }}
      run: |
        set -euo pipefail

        if [[ $CAN_CREATE_RELEASE != "true" ]]; then
          unset \
            RELEASE_TRIGGER_FILE\
            GITHUB_USER \
            GITHUB_API_KEY \
            SIGN_KEY \
            SIGN_KEY_PASS \
            SONATYPE_CENTRAL_USER \
            SONATYPE_CENTRAL_TOKEN \
            JAVADOC_BRANCH \
            SNAPSHOTS_BRANCH
        fi

        bash /tmp/gha-shared/resources/maven/build.sh \
          "-Djava.vendor=$COMPILE_JDK_VENDOR" \
          "-Djava.version=$COMPILE_JDK_VERSION" \
          "-Djava.vendor.unit-tests=$TEST_JDK_VENDOR" \
          "-Djava.version.unit-tests=$TEST_JDK_VERSION" \
          ${{ inputs.extra-maven-args }}


    - name: "After Build: Custom Bash script"
      if: inputs.after-build
      env:
        GITHUB_JOB_ID: ${{ github.job }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ${{ inputs.after-build }}


    ##################################################
    # Cache Update
    # See https://github.com/actions/cache/issues/342#issuecomment-1399442670
    ##################################################
    - name: "Cache: Delete Outdated (Local Maven Repository)"
      if: ${{ matrix.CAN_UPDATE_MAVEN_CACHE && always() && !cancelled() && steps.CACHE-RESTORE-MAVEN.outputs.cache-hit && !env.ACT }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh extension install actions/gh-actions-cache
        # "|| true" is to avoid "Error: Resource not accessible by integration" from failing the job 
        gh actions-cache delete ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-primary-key }} --confirm || true

    - name: "Cache: Save (Local Maven Repository)"
      uses: actions/cache/save@v4  # https://github.com/actions/cache/blob/main/save/README.md
      if: ${{ matrix.CAN_UPDATE_MAVEN_CACHE && always() && !cancelled() }} # save the cache even when the build failed
      with:
        path: |
          ~/.m2/bin
          ~/.m2/repository/*
          !~/.m2/repository/.cache
          !~/.m2/repository/.meta
          !~/.m2/repository/*SNAPSHOT*
        key: ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-primary-key }}


    - name: Collect coverage reports
      uses: actions/upload-artifact@v4
      if: matrix.UPLOAD_TO_CODECOV && (github.ref_name == 'main' || github.event_name == 'pull_request') && !env.ACT
      with:
        name: coverage-java${{ matrix.TEST_JDK_VERSION }}
        include-hidden-files: true
        path: ${{ github.workspace }}/**/target/site/jacoco*/jacoco.xml
        if-no-files-found: ${{ matrix.CAN_CREATE_RELEASE && 'warn' || 'error' }}


    - name: Upload test results to Codecov
      uses: codecov/test-results-action@v1
      if: matrix.UPLOAD_TO_CODECOV && !cancelled() && !env.ACT
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ github.workspace }}/**/target/surefire-reports/TEST-*.xml
        flags: jdk${{ matrix.TEST_JDK_VERSION }}


    ##################################################
    # Setup SSH debug session
    ##################################################
    - name: "SSH session for debugging: check"
      id: DEBUG_SSH_SESSSION_CHECK
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        JAVA_VERSION: ${{ matrix.TEST_JDK_VERSION }}
      run: |
        set -eu
        job_filter_pattern="${{ inputs.debug-with-ssh-only-jobs-matching }}"
        echo "job_filter: $job_filter_pattern"

        job_info=$(echo "$GITHUB_JOB ${{ runner.os }} java-$JAVA_VERSION" | tr -d '\n')
        echo "job_info: $job_info"

        when="${{ inputs.debug-with-ssh }}"

        shopt -s nocasematch # case-insensitive regex matching
        if [[ $when == "always" ]] || { [[ "$job_info" =~ .*$job_filter_pattern.* ]] && case "$JOB_STATUS" in
          success)   [[ $when == "always" ]] ;;
          cancelled) [[ $when == "on_failure_or_cancelled" ]] ;;
          failure)   [[ $when == "on_failure"* ]] ;;
        esac }; then
          echo "start_ssh_session=true" | tee -a "$GITHUB_OUTPUT"
        fi


    - name: "SSH session for debugging: start"
      uses: mxschmitt/action-tmate@v3  # https://github.com/mxschmitt/action-tmate
      if: always() && steps.DEBUG_SSH_SESSSION_CHECK.outputs.start_ssh_session
      with:
        limit-access-to-actor: ${{ inputs.debug-with-ssh-only-for-actor }}


  ###########################################################
  publish-coverage:
  ###########################################################
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.init.outputs.HAS_CODECOV_TOKEN && (github.ref_name == inputs.development-branch || github.event_name == 'pull_request') && !github.event.act
    steps:
    - name: Git Checkout  # required to avoid https://docs.codecov.com/docs/error-reference#unusable-reports
      uses: actions/checkout@v4  # https://github.com/actions/checkout


    - name: Download coverage reports
      uses: actions/download-artifact@v4
      with:
        pattern: coverage-*
        path: coverage


    - name: List coverage reports
      run: find . -name jacoco.xml 


    - name: Publish unit-test coverage
      uses: codecov/codecov-action@v5  # https://github.com/codecov/codecov-action
      with:
        slug: ${{ github.repository }}
        name: unit-coverage
        flags: unit-tests
        disable_search: true
        files: coverage/**/jacoco/jacoco.xml
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


    - name: Publish integration-test coverage
      uses: codecov/codecov-action@v5  # https://github.com/codecov/codecov-action
      with:
        slug: ${{ github.repository }}
        name: integration-coverage
        flags: integration-tests
        disable_search: true
        files: coverage/**/jacoco-it/jacoco.xml
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


    - name: "Delete intermediate build artifacts"
      uses: geekyeggo/delete-artifact@v5  # https://github.com/GeekyEggo/delete-artifact/
      with:
        name: "*"
        failOnError: false


  ###########################################################
  dependabot-pr-auto-merge:
  ###########################################################
    needs: build
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    concurrency: dependabot-pr-auto-merge

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2  # https://github.com/dependabot/fetch-metadata/
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"


    - name: Enable auto-merge for Dependabot PRs
      if: >-
        ${{
          (
            steps.metadata.outputs.package-ecosystem == 'github-actions' && 
            steps.metadata.outputs.update-type == 'version-update:semver-major'
          ) || (
            steps.metadata.outputs.package-ecosystem == 'maven' && 
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        }}
      env:
        PR_URL: ${{github.event.pull_request.html_url}}
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      run: |
        gh pr merge --auto --rebase "$PR_URL"
