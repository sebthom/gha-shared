name: Eclipse Product Build

on:
  workflow_call:

    inputs:  # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onworkflow_callinputs
      timeout-minutes:
        description: "Maximum number of minutes the workflow is allowed to run before timing out"
        default: 30
        type: number

      product-files:
        description: >
          A comma- or newline-separated list of Eclipse PDE *.product file to build with.
          The build artifacts of the first product file are used when publishing preview and stable releases.
          See https://www.vogella.com/tutorials/EclipseProductDeployment/article.html#product-configuration-file
          Each file is passed to the respective Maven build as `-Dtycho.product.file=<product-file>`, `-Dtycho.product=<product-filename-without-extension>`, `-Dtycho.product.uid=<product-uid>`
          Append an exclamation mark '!' suffix to allow failures for that target (e.g., `targets/unstable.target!`).
        required: true
        type: string
      target-files:
        description: >
          A comma- or newline-separated list of Eclipse PDE *.target files to build with. 
          The build artifacts of the first target platform are used when publishing preview and stable releases.
          See https://github.com/eclipse-pde/eclipse.pde/blob/master/docs/Target_Definitions.md
          Each file is passed to the respective Maven build as `-Dtycho.target-platform.file=<target-file>` and `-Dtycho.target-platform=<target-filename-without-extension>`
          Append an exclamation mark '!' suffix to allow failures for that target (e.g., `targets/unstable.target!`).
        required: true
        type: string

      development-branch:
        description: "Long-lived development branch that serves as the source for publishing preview releases (e.g., 'main' or 'develop')"
        default: main
        type: string
      development-updatesite-branch:
        description: "Long-lived branch that holds the update site of the latest publishing preview releases (e.g., 'updatesite-preview')"
        default: updatesite-preview
        type: string

      release-branch:
        description: "Long-lived release branch that serves as the source for publishing stable releases (e.g., 'release')"
        default: release
        type: string
      release-updatesite-branch:
        description: "Long-lived branch that holds the update site of the latest publishing stable releases (e.g., 'updatesite')"
        default: updatesite
        type: string

      release-archive-glob:
        description: >
          Glob pattern used to locate the update-site / p2 repository ZIP produced by the Maven Tycho build.
          Default matches typical artifacts, e.g. `./com.example.product/target/com.example.product-1.0.0.zip`
          or `./updatesite/target/com.example.product-1.0.0.zip`
        default: "**/target/*product-*.zip"
        type: string

      maven-jdk:
        description: "The JDK to run Apache Maven, either major version like 11, 17 or with vendor like 'temurin@11'"
        default: temurin@21
        type: string
      maven-versions:
        description: >
          A comma- or newline-separated list of Maven runtimes to use, for example `latest,3.6.1,mvnw`.
          Use `mvnw` to invoke the project's own `./mvnw` wrapper script; otherwise specify a version number or `latest`.
          If no version is given, falls back to any Maven already installed; if none is found, the latest release is downloaded and installed.
          Append an exclamation mark '!' suffix to allow failures for that Maven version (e.g., `latest!`).
        required: false
        type: string
      extra-maven-args:
        description: "Additional command-line arguments to append to all Maven invocations"
        required: false
        type: string
      maven-settings-file:
        description: "Path to a custom Maven settings.xml file to use during the build"
        required: false
        type: string
      set-jdk-version-properties:
        description: >
          Determines whether Maven system properties reporting the JDK versions and vendors used during compilation and testing are automatically set.
          If enabled (`true`), the build includes these properties:
            -Djava.version=<compile-jdk-major-version>  
            -Djava.vendor=<compile-jdk-vendor>  
            -Djava.version.unit-tests=<test-jdk-major-version>  
            -Djava.vendor.unit-tests=<test-jdk-vendor>
        # NOTE: using 'string' here is a WORKAROUND so the job doesn’t hang when the caller omits the value (push events pass 'undefined').
        type: string
        default: "true"
        #default: true
        #type: boolean

      before-build: 
        description: "Bash commands executed before the Maven build"
        required: false
        type: string
      after-build:
        description: "Bash commands executed after the Maven build" 
        required: false
        type: string

      debug-with-ssh:
        description: >-
          When to open an SSH session for post-build debugging:
          always | on_failure | on_failure_or_cancelled | never
        default: "never"
        type: string
      debug-with-ssh-only-for-actor:
        description: "Restrict SSH debug session access to the GitHub user who triggered the workflow"
        # NOTE: using 'string' here is a WORKAROUND so the job doesn’t hang when the caller omits the value (push events pass 'undefined').
        type: string
        default: "true"
        #default: true
        #type: boolean
      debug-with-ssh-only-jobs-matching:
        description: "Only start an SSH session for jobs matching this regex pattern:"
        default: ".*"
        type: string

      # workaround for https://github.com/actions/toolkit/issues/1264
      gha-shared-repo:    { default: "sebthom/gha-shared", type: string, description: "Repository containing this workflow" }
      gha-shared-version: { default: "v1",                 type: string, description: "Version of this workflow: branch, tag or commit" }

    outputs:
      release-name:
        description: Name of the GitHub release created (empty when no release)
        value: ${{ jobs.build.outputs.RELEASE_NAME }}
      release-updatesite-branch:
        description: Branch that hosts the generated p2 update-site (empty when no release)
        value: ${{ jobs.build.outputs.RELEASE_UPDATESITE_BRANCH }}


defaults:
  run:
    shell: bash


jobs:
  ###########################################################
  init:
  ###########################################################
    runs-on: ubuntu-latest  # https://github.com/actions/runner-images#available-images

    steps:
    - name: "Show: GitHub context"
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: printf '%s' "$GITHUB_CONTEXT" | python -m json.tool


    - name: "Show: environment variables"
      run: env | sort


    - name: Git Checkout
      uses: actions/checkout@v4  # https://github.com/actions/checkout


    - name: Lint shell scripts
      uses: luizm/action-sh-checker@master  # https://github.com/marketplace/actions/sh-checker
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SHFMT_OPTS: >
          --simplify
          --keep-padding
        SHELLCHECK_OPTS: -x -e SC1090
          # -x -> external-sources=true https://github.com/koalaman/shellcheck/wiki/directive#external-sources
          # -e SC1090 > (info): SC1090 (warning): ShellCheck can't follow non-constant source.
      with:
         sh_checker_comment: true
         sh_checker_checkbashisms_enable: true
         sh_checker_shfmt_disable: true


    - name: Parse inputs
      id: PARSE_INPUTS
      env:
        PYTHONUTF8: 1  # workaround for "UnicodeEncodeError: 'charmap' codec can't encode character" on Windows
        MAVEN_JDK:        ${{ inputs.maven-jdk }}
        MAVEN_VERSIONS:   ${{ inputs.maven-versions }}
        PRODUCT_FILES:    ${{ inputs.product-files }}
        TARGET_FILES:     ${{ inputs.target-files }}
        ON_DEV_BRANCH:    ${{ github.ref == format('refs/heads/{0}', inputs.development-branch) && 'true' || 'false' }}
        ON_REL_BRANCH:    ${{ github.ref == format('refs/heads/{0}', inputs.release-branch)     && 'true' || 'false' }}
        DEV_UPDATE_SITE_BRANCH: ${{ inputs.development-updatesite-branch }}
        REL_UPDATE_SITE_BRANCH: ${{ inputs.release-updatesite-branch }}
        DISABLE_RELEASES: ${{ (env.ACT && !env.GITEA_ACTIONS) && 'true' || 'false' }}  # no releases when running via nektos/act locally
      shell: python {0}
      run: |
        import collections, json, os, re, uuid, sys, xml.etree.ElementTree as ET
        ENV = os.environ

        def parse_jdk(jdk_spec: str):
            # Parse JDK spec with optional '!' indicating allowed failure
            # return (vendor, version, allow_failure) with default vendor 'temurin'
            allow_failure = jdk_spec.endswith('!')
            jdk_spec = jdk_spec[:-1] if allow_failure else jdk_spec
            if '@' in jdk_spec:
                vendor, version = jdk_spec.split('@', 1)
            else:
                vendor, version = 'temurin', jdk_spec
            return vendor.strip(), version.strip(), allow_failure

        def parse_maven(mvn_spec: str):
            # Parse Maven version spec with optional '!' indicating allowed failure
            # return (version, allow_failure)
            allow_failure = mvn_spec.endswith('!')
            version = mvn_spec[:-1] if allow_failure else mvn_spec
            return version.strip(), allow_failure

        def parse_product(product_spec: str):
            # Parse *.product spec with optional '!' indicating allowed failure
            # return (target_file, allow_failure)
            allow_failure = product_spec.endswith('!')
            product_file = product_spec[:-1] if allow_failure else product_spec
            return product_file.strip(), allow_failure

        def parse_target(target_spec: str):
            # Parse *.target spec with optional '!' indicating allowed failure
            # return (target_file, allow_failure)
            allow_failure = target_spec.endswith('!')
            target_file = target_spec[:-1] if allow_failure else target_spec
            return target_file.strip(), allow_failure

        def split_items(value: str):
            # Split on comma *or* any newline sequence (\n, \r\n, \r), collapse multiple
            # separators, and return trimmed, **unique** tokens in first-seen order.
            tokens = [v.strip() for v in re.split(r'[,\r\n]+', value) if v.strip()]
            return list(collections.OrderedDict.fromkeys(tokens))

        def parse_product_file(file_path: str):
            # Returns (product_uid, launcher_name) from the Eclipse product XML.
            root = ET.parse(file_path).getroot()
            uid = root.attrib.get('uid')
            launcher = root.find('launcher')
            name = launcher.attrib.get('name') if launcher is not None else None
            if uid is None or name is None:
                raise ValueError(f"Could not find uid or launcher/@name in {file_path!r}")
            return uid, name

        def get_jdk_version_from_target(file_path: str) -> str:
            # Parse an Eclipse .target file and return the JavaSE version from the <targetJRE> path, 
            # validating it matches the expected container/VMType/JavaSE-<version> format.

            target_jre = ET.parse(file_path).getroot().find('targetJRE')
            if target_jre is None or 'path' not in target_jre.attrib:
                raise ValueError(f"No <targetJRE> element with a 'path' attribute found in {file_path!r}.")

            path = target_jre.attrib['path']
            m = re.compile(r'^org\.eclipse\.jdt\.launching\.JRE_CONTAINER/org\.eclipse\.jdt\.internal\.debug\.ui\.launcher\.StandardVMType/JavaSE-(\d+)$').match(path)
            if not m:
                raise ValueError(
                    f"Unexpected <targetJRE> path format in {file_path!r}: {path!r}\n"
                    "Expected: org.eclipse.jdt.launching.JRE_CONTAINER/org.eclipse.jdt.internal.debug.ui.launcher.StandardVMType/JavaSE-<version>"
                )
            return m.group(1)

        maven_jdk     = parse_jdk(ENV["MAVEN_JDK"])
        product_files = [parse_product(t) for t in split_items(ENV["PRODUCT_FILES"])]
        target_files  = [parse_target(t)  for t in split_items(ENV["TARGET_FILES"])]
        mvn_versions  = [parse_maven(m)   for m in split_items(ENV["MAVEN_VERSIONS"])]
        if not mvn_versions:
            mvn_versions = [("mvnw" if os.path.isfile("./mvnw") else "any", False)]

        on_dev_branch = ENV["ON_DEV_BRANCH"] == "true"
        on_rel_branch = ENV["ON_REL_BRANCH"] == "true"

        matrix = []

        for product_idx, (product_file, product_allow_failure) in enumerate(product_files):
            product_uid, launcher_name = parse_product_file(product_file)
            for mvn_idx, (mvn_version, mvn_allow_failure) in enumerate(mvn_versions):
                for target_idx, (target_file, target_allow_failure) in enumerate(target_files):
                    if not os.path.isfile(target_file):
                       print(f"❌ Specified target file '{target_file}' does not exist.", file=sys.stderr)
                       sys.exit(1)
                    is_release_job = (
                        len(matrix) == 0  # first matrix job is used to create releases
                        and ENV["DISABLE_RELEASES"] != "true"
                    )
                    release_name = ""
                    release_updatesite_branch = ""
                    concurrency_group = uuid.uuid4().hex
                    if is_release_job:
                        if on_dev_branch:
                            release_name = "preview"
                            concurrency_group = f"{ENV['GITHUB_WORKFLOW']}-preview"
                            release_updatesite_branch = ENV['DEV_UPDATE_SITE_BRANCH']
                        elif on_rel_branch:
                            release_name = "stable"
                            concurrency_group = f"{ENV['GITHUB_WORKFLOW']}-stable"
                            release_updatesite_branch = ENV['REL_UPDATE_SITE_BRANCH']

                    jdk_version = get_jdk_version_from_target(target_file)
                    entry = {
                      "TEST_JDK_VERSION":       jdk_version,
                      "TEST_JDK_VENDOR":        "temurin",
                      "TARGET_FILE":            target_file,
                      "MAVEN_VERSION":          mvn_version,
                      "PRODUCT_FILE":           product_file,
                      "PRODUCT_UID":            product_uid,
                      "LAUNCHER_NAME":          launcher_name,
                      "COMPILE_JDK_VERSION":    jdk_version,
                      "COMPILE_JDK_VENDOR":     "temurin",
                      "MAVEN_JDK_VERSION":      maven_jdk[1],
                      "MAVEN_JDK_VENDOR":       maven_jdk[0],
                      "RELEASE_NAME":           release_name,
                      "UPDATESITE_BRANCH":      release_updatesite_branch,
                      "CAN_UPDATE_MAVEN_CACHE": product_idx == 0 and mvn_idx == 0 and target_idx == 0,
                      "CAN_UPDATE_TYCHO_CACHE": product_idx == 0 and mvn_idx == 0,
                      "CONCURRENCY_GROUP":      concurrency_group,
                      "ALLOW_FAILURE":          product_allow_failure or mvn_allow_failure or target_allow_failure
                    }
                    if entry not in matrix:
                        matrix.append(entry)

        json_out = json.dumps(matrix, separators=(",",":"))
        print("::group::Generated Matrix Config")
        print(json.dumps(matrix, indent=2, sort_keys=True))
        print("::endgroup::")

        # write to GitHub output
        with open(ENV["GITHUB_OUTPUT"], "a") as out:
            out.write(f"MATRIX={json_out}\n")


    outputs:
      MATRIX: ${{ steps.PARSE_INPUTS.outputs.MATRIX }}


  ###########################################################
  build:
  ###########################################################
    # need to run on Windows to build portableapps.com installer
    runs-on: windows-latest  # https://github.com/actions/runner-images#available-images
    continue-on-error: ${{ matrix.ALLOW_FAILURE }}
    needs: [ init ]
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.init.outputs.MATRIX) }}


    # https://docs.github.com/en/actions/using-jobs/using-concurrency
    concurrency:
      group: ${{ matrix.CONCURRENCY_GROUP }}
      cancel-in-progress: false


    permissions:
      actions: write  # to delete action cache entries
      contents: write # to create releases (commit to dev branch, create tags)


    env:
      EXTRA_MAVEN_ARGS: ${{ inputs.extra-maven-args }}  # added as env var so the before-build step can modify it if needed 


    steps:
    - name: "Show: GitHub context"
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: printf '%s' "$GITHUB_CONTEXT" | python -m json.tool


    - name: "Show: Matrix config"
      env:
        MATRIX: ${{ toJSON(matrix) }}
      run: printf '%s' "$MATRIX" | python -m json.tool


    - name: "Show: environment variables"
      run: env | sort


    - name: "Show: Init job outputs"
      env:
        JOB_OUTPUT: ${{ toJson(needs.init.outputs) }}
      run: printf '%s' "$JOB_OUTPUT" | python -m json.tool


    - name: Git Checkout
      uses: actions/checkout@v4  # https://github.com/actions/checkout
      with:
        fetch-depth: 0  # required to prevent tycho-p2-extras-plugin:compare-version-with-baseline potentially failing the build


    - name: Download workflow resources
      env:
        GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_REPO:    ${{ inputs.gha-shared-repo }}    # e.g. sebthom/gha-shared
        WORKFLOW_VERSION: ${{ inputs.gha-shared-version }} # branch, tag or commit SHA
        DEST: ./.git/tmp/gha-shared
      run: |
        set -euo pipefail

        if [[ $GITHUB_REPOSITORY == "sebthom/gha-shared" ]]; then  # for fast local tests via nektos/act
            rm -rf ./.git/tmp/gha-shared
            mkdir -p ./.git/tmp/gha-shared
            cp -r ./.github ./.git/tmp/gha-shared/
            cp -r ./resources ./.git/tmp/gha-shared/
            exit
        fi

        URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${WORKFLOW_REPO}.git"
        REF="$WORKFLOW_VERSION"

        # Trim refs/heads/ or refs/tags/ if present
        [[ "$REF" == refs/* ]] && REF="${REF#refs/heads/}" && REF="${REF#refs/tags/}"

        rm -rf "$DEST" # for nektos/act in case of re-runs

        # If REF looks like a 40-char SHA, treat as commit; else as branch/tag
        if [[ "$REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
          echo "Cloning repo [$WORKFLOW_REPO] and checking out commit [$REF]..."
          (
            set -x; 
            git clone --depth 1 --no-checkout "$URL" "$DEST";
            git -C "$DEST" fetch --depth 1 origin "$REF";
            git -C "$DEST" checkout "$REF";
          )
        else
          echo "Cloning repo [$WORKFLOW_REPO] and checking out branch/tag [$REF]..."
          (set -x; git clone --depth 1 --branch "$REF" "$URL" "$DEST")
        fi

        echo "✅ Checked out $WORKFLOW_REPO@$WORKFLOW_VERSION into $DEST"
        (set -x; ls -l "$DEST")


    - name: Install JDKs ☕
      uses: ./.git/tmp/gha-shared/.github/actions/setup-java
      with:
        jdks: |
          ${{ matrix.COMPILE_JDK_VENDOR }}@${{ matrix.COMPILE_JDK_VERSION }}
          ${{ matrix.TEST_JDK_VENDOR    }}@${{ matrix.TEST_JDK_VERSION    }}
          ${{ matrix.MAVEN_JDK_VENDOR   }}@${{ matrix.MAVEN_JDK_VERSION   }}


    - name: Configure JDKs ☕
      id: JDKS
      run: |
        function get_java_home() {
          local java_home_varname="JAVA${1}_${2}_HOME"
          java_home_varname="$(printf '%s' "$java_home_varname" | tr '[:lower:]' '[:upper:]')"
          printf '%s\n' "${!java_home_varname}"
        }

        echo "COMPILE_JDK_HOME=$(get_java_home "${{ matrix.COMPILE_JDK_VERSION }}" "${{ matrix.COMPILE_JDK_VENDOR }}")" >>"$GITHUB_OUTPUT"
        echo "TEST_JDK_HOME=$(get_java_home "${{ matrix.TEST_JDK_VERSION }}" "${{ matrix.TEST_JDK_VENDOR }}")" >>"$GITHUB_OUTPUT"

        # activate JDK for Maven
        echo "Activating JDK [${{ matrix.MAVEN_JDK_VENDOR }}@${{ matrix.MAVEN_JDK_VERSION }}] for Maven..."
        JAVA_HOME="$(get_java_home "${{ matrix.MAVEN_JDK_VERSION }}" "${{ matrix.MAVEN_JDK_VENDOR }}")"
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          echo "${JAVA_HOME}\\bin" >>"$GITHUB_PATH"
        else
          echo "${JAVA_HOME}/bin" >>"$GITHUB_PATH"
        fi
        echo "JAVA_HOME=${JAVA_HOME}" >>"$GITHUB_ENV"

        echo "::group::GITHUB_PATH"
          cat "$GITHUB_PATH"
        echo "::endgroup::"

        echo "::group::GITHUB_ENV"
          cat "$GITHUB_ENV"
        echo "::endgroup::"

        echo "::group::GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
        echo "::endgroup::"


    - name: "Cache: Restore (Local Maven Repository)"
      id: CACHE-RESTORE-MAVEN
      uses: actions/cache/restore@v4  # https://github.com/actions/cache/blob/main/restore/README.md
      with:
        # IMPORTANT: path must have exactly the same value as in the cache save step otherwise restore will fail with cache key not found 
        path: |
          ~/.m2/bin
          ~/.m2/repository/*
          !~/.m2/repository/.cache
          !~/.m2/repository/.meta
          !~/.m2/repository/com/vegardit/no-npe
          !~/.m2/repository/p2
          !~/.m2/repository/*SNAPSHOT*
        key: mvn-repo-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          mvn-repo-


    - name: "Cache: Restore (Local Tycho Repository)"
      id: CACHE-RESTORE-TYCHO
      uses: actions/cache/restore@v4  # https://github.com/actions/cache/blob/main/restore/README.md
      with:
        # IMPORTANT: path must have exactly the same value as in the cache save step otherwise restore will fail with cache key not found
        path: |
          ~/.m2/repository/.cache/tycho
          ~/.m2/repository/.meta/p2-artifacts.properties
          ~/.m2/repository/p2
        key: repo-tycho-${{ hashFiles(matrix.TARGET_FILE) }}
        restore-keys: |
          repo-tycho-


    - name: "Move Restored Local Maven Repo"
      if: ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-hit }}
      id: MOVE_RESTORED_MAVEN_REPO
      run: |
        set -euxo pipefail

        RESTORED_MAVEN_REPO_PATH=$HOME/.m2/repository-restored

        (set -x; ls -lart ~/.m2)
        if [[ -d "$HOME/.m2/repository" ]]; then
          (set -x; mv -v ~/.m2/repository "$RESTORED_MAVEN_REPO_PATH")
        else
          (set -x; mkdir -p "$RESTORED_MAVEN_REPO_PATH")
        fi
        echo "REPO_PATH=$RESTORED_MAVEN_REPO_PATH" >>$GITHUB_OUTPUT


    - name: "Before Build: Custom Bash script"
      if: inputs.before-build
      env:
        GITHUB_JOB_ID: ${{ github.job }}
        GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
      run: ${{ inputs.before-build }}


    - name: "Build with Maven 🔨"
      env:
        # core settings
        TARGET_FILE: ${{ matrix.TARGET_FILE }}

        MAVEN_VERSION:            ${{ matrix.MAVEN_VERSION }}
        MAVEN_SETTINGS_FILE:      ${{ inputs.maven-settings-file || './.git/tmp/gha-shared/resources/maven/settings.xml' }}
        RESTORED_MAVEN_REPO_PATH: ${{ steps.MOVE_RESTORED_MAVEN_REPO.outputs.REPO_PATH }}

        COMPILE_JDK_VENDOR:  ${{ matrix.COMPILE_JDK_VENDOR }}
        COMPILE_JDK_VERSION: ${{ matrix.COMPILE_JDK_VERSION }}
        COMPILE_JDK_HOME:    ${{ steps.JDKS.outputs.COMPILE_JDK_HOME }}
        TEST_JDK_VENDOR:     ${{ matrix.TEST_JDK_VENDOR }}
        TEST_JDK_VERSION:    ${{ matrix.TEST_JDK_VERSION }}
        TEST_JDK_HOME:       ${{ steps.JDKS.outputs.TEST_JDK_HOME }}

        PRODUCT_FILE:         ${{ matrix.PRODUCT_FILE }}   # e.g. dart-studio.product
        PRODUCT_UID:          ${{ matrix.PRODUCT_UID }}    # e.g. org.dart4e.studio -> defined in .product
        LAUNCHER_NAME:        ${{ matrix.LAUNCHER_NAME }}  # e.g. Dart4EStudio -> defined in .product

        # release toggles & credentials - will be unset for PR runs
        RELEASE_NAME:         ${{ matrix.RELEASE_NAME }}
        RELEASE_ARCHIVE_GLOB: ${{ inputs.release-archive-glob }}

        UPDATESITE_BRANCH: ${{ matrix.UPDATESITE_BRANCH }}
      run: |
        set -euo pipefail

        source ./.git/tmp/gha-shared/resources/maven/configure-maven.sh

        maven_args=()
        if [[ "${{ inputs.set-jdk-version-properties }}" == "true" ]]; then
          maven_args+=( "-Djava.vendor=${COMPILE_JDK_VENDOR}" )
          maven_args+=( "-Djava.version=${COMPILE_JDK_VERSION}" )
          maven_args+=( "-Djava.vendor.unit-tests=${TEST_JDK_VENDOR}" )
          maven_args+=( "-Djava.version.unit-tests=${TEST_JDK_VERSION}" )
        fi

        $maven \
          -Declipse.p2.mirrors=false \
          "-Dtycho.target-platform=$(basename "$TARGET_FILE" .target)" \
          "-Dtycho.target-platform.file=$TARGET_FILE" \
          "-Dtycho.product=$(basename "$PRODUCT_FILE" .product)" \
          "-Dtycho.product.file=$PRODUCT_FILE" \
          "-Dtycho.product.uid=$PRODUCT_UID" \
          "${maven_args[@]}" \
          $EXTRA_MAVEN_ARGS \
          help:active-profiles clean verify || (
            rc=$?
            if [[ ${ACT:-} != "true" ]]; then
              find . -path "*/target/work/data/.metadata/.log" | while IFS= read -r file; do
                echo "::group::$file"
                  cat "$file"
                echo "::endgroup::"
              done
            fi
            exit $rc
          )

        cd product/target/products

        # remove unused dynamic libs
        rm -rf \
          $PRODUCT_UID/linux/gtk/x86_64/plugins/com.sun.jna_*/com/sun/jna/{aix,darwin,dragonflybsd,freebsd,linux-a,linux-l,linux-m,linux-p,linux-r,linux-s,openbsd,sunos,win32}* \
          $PRODUCT_UID/macosx/cocoa/x86_64/Eclipse.app/Contents/Eclipse/plugins/com.sun.jna_*/com/sun/jna/{aix,dragonflybsd,freebsd,linux,openbsd,sunos,win32}* \
          $PRODUCT_UID/win32/win32/x86_64/plugins/com.sun.jna_*/com/sun/jna/{aix,darwin,dragonflybsd,freebsd,linux,openbsd,sunos}*

        # generate linux x86_64 archive
        (
          cd $PRODUCT_UID/linux/gtk/x86_64; 
          tar -cf ../../../../${PRODUCT_UID}-linux.gtk.x86_64.tar --exclude='HaxeStudio' --exclude='plugins/org.eclipse.justj.*/jre/bin' *;
          tar --mode='+x' --append -f ../../../../${PRODUCT_UID}-linux.gtk.x86_64.tar HaxeStudio plugins/org.eclipse.justj.*/jre/bin/*
        )
        gzip -9 ${PRODUCT_UID}-linux.gtk.x86_64.tar

        # generate macos aarch64 archive
        (
          cd $PRODUCT_UID/macosx/cocoa/aarch64; 
          tar -cf ../../../../${PRODUCT_UID}-macosx.cocoa.aarch64.tar --exclude='Eclipse.app/Contents/MacOS/HaxeStudio' --exclude='Eclipse.app/Contents/Eclipse/plugins/org.eclipse.justj.*/jre/bin' *;
          tar --mode='+x' --append -f ../../../../${PRODUCT_UID}-macosx.cocoa.aarch64.tar Eclipse.app/Contents/MacOS/HaxeStudio Eclipse.app/Contents/Eclipse/plugins/org.eclipse.justj.*/jre/bin/*
        )
        gzip -9 ${PRODUCT_UID}-macosx.cocoa.aarch64.tar

        # generate macos x86_64 archive
        (
          cd $PRODUCT_UID/macosx/cocoa/x86_64; 
          tar -cf ../../../../${PRODUCT_UID}-macosx.cocoa.x86_64.tar --exclude='Eclipse.app/Contents/MacOS/HaxeStudio' --exclude='Eclipse.app/Contents/Eclipse/plugins/org.eclipse.justj.*/jre/bin' *;
          tar --mode='+x' --append -f ../../../../${PRODUCT_UID}-macosx.cocoa.x86_64.tar Eclipse.app/Contents/MacOS/HaxeStudio Eclipse.app/Contents/Eclipse/plugins/org.eclipse.justj.*/jre/bin/*
        )
        gzip -9 ${PRODUCT_UID}-macosx.cocoa.x86_64.tar

        # generate windows x86_64 archive
        7z a -mx9 -tzip ${PRODUCT_UID}-win.x86_64.zip ./$PRODUCT_UID/win32/win32/x86_64/*


    - name: Locate release archive
      id: find_release_archive
      if: ${{ matrix.RELEASE_NAME }}  # only when we're actually releasing
      env:
        RELEASE_ARCHIVE_GLOB: ${{ inputs.release-archive-glob }}
        PYTHONUTF8: 1  # workaround for "UnicodeEncodeError: 'charmap' codec can't encode character '\u2705'" on Windows
      shell: python {0}
      run: |
        # cannot use "shopt -s globstar nullglob; matches=( $RELEASE_ARCHIVE_GLOB )" which is not supported on MacOS default Bash 3.2
        # falling back to python based solution
        import itertools, glob, os, re, sys, shutil
        def brace_expand(pattern: str):
            # Expand simple {a,b,c} (not-nested) brace expressions inside *pattern*.
        
            # Find all {alt1,alt2} groups
            parts        = re.split(r'(\{[^{}]+\})', pattern)
            brace_groups = [p[1:-1].split(',') if p.startswith('{') else [p] for p in parts]
        
            expanded = [''.join(p) for p in itertools.product(*brace_groups)]
            return list(dict.fromkeys(expanded)) # returns deduped patterns

        matches = []
        for glob_pattern in brace_expand(os.environ["RELEASE_ARCHIVE_GLOB"]):
            matches.extend(glob.glob(glob_pattern, recursive=True))

        if len(matches) == 0:
            print(f"❌ No archive found matching '{os.environ['RELEASE_ARCHIVE_GLOB']}'", file=sys.stderr)
            sys.exit(1)
        if len(matches) > 1:
            print(f"❌ Multiple archives found: {matches}", file=sys.stderr)
            sys.exit(1)
        print(f"✅ Found update-site archive: {matches[0]}")

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"archive={matches[0]}\n")


    - name: Generate PortableApps archive
      env:
        LAUNCHER_NAME: ${{ matrix.LAUNCHER_NAME }}  # e.g. Dart4EStudio -> defined in .product
      run: |
        set -euo pipefail
        
        bash product/build-paf.sh
        
        if [[ ! -e product/target/${LAUNCHER_NAME}Portable.paf.exe ]]; then
          echo "Expected build output [product/target/${LAUNCHER_NAME}Portable.paf.exe] not found!"
          exit 1
        fi


    - name: "Delete previous '${{ matrix.RELEASE_NAME }}' release"
      if: ${{ matrix.RELEASE_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_NAME: ${{ matrix.RELEASE_NAME }}
      # https://cli.github.com/manual/gh_release_delete
      run: |
        GH_DEBUG=1 gh release delete "$RELEASE_NAME" --yes --cleanup-tag || true


    - name: "Create '${{ matrix.RELEASE_NAME }}' release"
      if: ${{ matrix.RELEASE_NAME }}
      env:
        GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        COMMIT_MSG:    ${{ github.event.head_commit.message }}  # https://stackoverflow.com/a/78420438/5116073
        RELEASE_NAME:  ${{ matrix.RELEASE_NAME }}
        PRODUCT_UID:   ${{ matrix.PRODUCT_UID }}  # e.g. org.dart4e.studio -> defined in .product
        LAUNCHER_NAME: ${{ matrix.LAUNCHER_NAME }}  # e.g. Dart4EStudio -> defined in .product
      # https://cli.github.com/manual/gh_release_create
      run: |
        GH_DEBUG=1 gh release create "$RELEASE_NAME" \
          --title "$RELEASE_NAME" \
          ${{ matrix.RELEASE_NAME == 'stable' && '--latest' || '' }} \
          ${{ matrix.RELEASE_NAME == 'preview' && '--prerelease' || '' }} \
          --notes "$COMMIT_MSG" \
          --target "${{ github.sha }}" \
          product/target/products/${PRODUCT_UID}-linux.gtk.x86_64.tar.gz \
          product/target/products/${PRODUCT_UID}-macosx.cocoa.aarch64.tar.gz \
          product/target/products/${PRODUCT_UID}-macosx.cocoa.x86_64.tar.gz \
          product/target/products/${PRODUCT_UID}-win.x86_64.zip \
          product/target/${LAUNCHER_NAME}Portable.paf.exe


    - name: Deploy p2 update site
      if: ${{ matrix.RELEASE_NAME }}
      env:
        GITHUB_USER:  ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO:  ${{ github.repository }}
        BRANCH_NAME:  ${{ matrix.UPDATESITE_BRANCH }}
        RELEASE_ARCHIVE: ${{ steps.find_release_archive.outputs.archive }}
      run: |
        set -euo pipefail

        last_commit_message=$(git log --pretty=format:"%s (%h)" -1)

        # https://github.community/t/github-actions-bot-email-address/17204
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        cd /tmp
        github_repo_url="https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/$GITHUB_REPO"
        if curl --output /dev/null --silent --head --fail "$github_repo_url/tree/$BRANCH_NAME"; then
          git clone "$github_repo_url" --single-branch --branch "$BRANCH_NAME" updatesite
          cd updatesite
          git reset --hard HEAD^  # revert previous commit
        else
          git clone "$github_repo_url" updatesite
          cd updatesite
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf .
          cat <<EOF > index.html
            <!DOCTYPE html>
            <html>
            <head>
              <title>$GITHUB_REPO - Update Site</title>
            </head>
            <body>
            <h1>$$GITHUB_REPO - Update Site</h1>
            </body>
            </html>
        EOF
          git add index.html
          git commit -am "Initialize Update Site"
        fi

        jar xf "$GITHUB_WORKSPACE/$RELEASE_ARCHIVE"
        git add --all
        git commit -am "$last_commit_message"
        git push origin "$BRANCH_NAME" --force


    - name: "After Build: Custom Bash script"
      if: inputs.after-build
      env:
        GITHUB_JOB_ID: ${{ github.job }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ${{ inputs.after-build }}


    ##################################################
    # Cache Update
    # See https://github.com/actions/cache/issues/342#issuecomment-1399442670
    ##################################################
    - name: "Cache: Delete Outdated (Local Maven Repository)"
      if: ${{ matrix.CAN_UPDATE_MAVEN_CACHE && always() && !cancelled() && steps.CACHE-RESTORE-MAVEN.outputs.cache-hit && !env.ACT }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh extension install actions/gh-actions-cache
        # "|| true" is to avoid "Error: Resource not accessible by integration" from failing the job 
        gh actions-cache delete ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-primary-key }} --confirm || true

    - name: "Cache: Save (Local Maven Repository)"
      uses: actions/cache/save@v4  # https://github.com/actions/cache/blob/main/save/README.md
      if: ${{ matrix.CAN_UPDATE_MAVEN_CACHE && always() && !cancelled() }}  # save the cache even when the build failed
      with:
        # Excluded sub directory not working https://github.com/actions/toolkit/issues/713
        path: |
          ~/.m2/bin
          ~/.m2/repository/*
          !~/.m2/repository/.cache
          !~/.m2/repository/.meta
          !~/.m2/repository/com/vegardit/no-npe
          !~/.m2/repository/p2
          !~/.m2/repository/*SNAPSHOT*
        key: ${{ steps.CACHE-RESTORE-MAVEN.outputs.cache-primary-key }}


    - name: "Cache: Delete Outdated (Local Tycho Repository)"
      if: ${{ matrix.CAN_UPDATE_TYCHO_CACHE && always() && !cancelled() && steps.CACHE-RESTORE-TYCHO.outputs.cache-hit && !env.ACT }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # "|| true" is to avoid "Error: Resource not accessible by integration" from failing the job 
        gh actions-cache delete ${{ steps.CACHE-RESTORE-TYCHO.outputs.cache-primary-key }} --confirm || true


    - name: "Cache: Save (Local Tycho Repository)"
      uses: actions/cache/save@v4  # https://github.com/actions/cache/blob/main/save/README.md
      if: ${{ matrix.CAN_UPDATE_TYCHO_CACHE && always() && !cancelled() }}  # save the cache even when the build failed
      with:
        path: |
          ~/.m2/repository/.cache/tycho
          ~/.m2/repository/.meta/p2-artifacts.properties
          ~/.m2/repository/p2
        key: ${{ steps.CACHE-RESTORE-TYCHO.outputs.cache-primary-key }}


    ##################################################
    # Setup SSH debug session
    ##################################################
    - name: "SSH session for debugging: check"
      id: DEBUG_SSH_SESSSION_CHECK
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        JAVA_VERSION: ${{ matrix.TEST_JDK_VERSION }}
      run: |
        set -eu
        job_filter_pattern="${{ inputs.debug-with-ssh-only-jobs-matching }}"
        echo "job_filter: $job_filter_pattern"

        job_info=$(echo "$GITHUB_JOB ${{ runner.os }} java-$JAVA_VERSION" | tr -d '\n')
        echo "job_info: $job_info"

        when="${{ inputs.debug-with-ssh }}"

        shopt -s nocasematch # case-insensitive regex matching
        if [[ $when == "always" ]] || { [[ "$job_info" =~ .*$job_filter_pattern.* ]] && case "$JOB_STATUS" in
          success)   [[ $when == "always" ]] ;;
          cancelled) [[ $when == "on_failure_or_cancelled" ]] ;;
          failure)   [[ $when == "on_failure"* ]] ;;
        esac }; then
          echo "start_ssh_session=true" | tee -a "$GITHUB_OUTPUT"
        fi


    - name: "SSH session for debugging: start"
      uses: mxschmitt/action-tmate@v3  # https://github.com/mxschmitt/action-tmate
      if: always() && steps.DEBUG_SSH_SESSSION_CHECK.outputs.start_ssh_session
      with:
        limit-access-to-actor: ${{ inputs.debug-with-ssh-only-for-actor }}


    ##################################################
    # Export metadata
    ##################################################
    - name: Set job outputs
      id: OUTPUTS
      if: ${{ matrix.RELEASE_NAME && success() }}
      run: |
        set -euo pipefail

        # A preview or stable release was **intended** for this cell.
        # Check whether a tag now points at HEAD.
        tag=$(git describe --exact-match --tags HEAD 2>/dev/null || true)

        echo "RELEASE_NAME=${{ matrix.RELEASE_NAME }}" >>"$GITHUB_OUTPUT"
        echo "RELEASE_UPDATESITE_BRANCH=${{ matrix.UPDATESITE_BRANCH }}" >>"$GITHUB_OUTPUT"


    outputs:
      RELEASE_NAME:              ${{ steps.OUTPUTS.outputs.RELEASE_NAME }}
      RELEASE_UPDATESITE_BRANCH: ${{ steps.OUTPUTS.outputs.RELEASE_UPDATESITE_BRANCH }}


  ###########################################################
  dependabot-pr-auto-merge:
  ###########################################################
    needs: build
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    concurrency: dependabot-pr-auto-merge

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2  # https://github.com/dependabot/fetch-metadata/
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"


    - name: Enable auto-merge for Dependabot PRs
      if: >-
        ${{
          (
            steps.metadata.outputs.package-ecosystem == 'github-actions' && 
            steps.metadata.outputs.update-type == 'version-update:semver-major'
          ) || (
            steps.metadata.outputs.package-ecosystem == 'maven' && 
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        }}
      env:
        PR_URL: ${{github.event.pull_request.html_url}}
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      run: |
        gh pr merge --auto --rebase "$PR_URL"
